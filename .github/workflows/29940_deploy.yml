name: 29940_deploy

on:
  # Deploy workflow se sproži po zaključku testnega workflowa.
  workflow_run:
    workflows: ["29940_test"]
    types:
      - completed

jobs:
  deploy:
    # Deploy se izvede samo, če je testni workflow uspešen.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    permissions:
      actions: read
      contents: read

    steps:
      # Checkout istega commita, ki ga je testiral prvi workflow.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Prenesemo artefakt iz testnega workflowa.
      - name: Download artifact from test workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -rf test-status
          gh run download ${{ github.event.workflow_run.id }} -n test-status

      # Če napaka.txt ni prazna, deploy ne sme steči.
      - name: Verify napaka.txt
        shell: bash
        run: |
          if [ -s test-status/napaka.txt ]; then
            echo "napaka.txt ni prazna, deploy se prekine."
            cat test-status/napaka.txt
            exit 1
          fi

      # Priprava Docker Buildx okolja.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Prijava v Docker Hub z uporabniškim imenom in tokenom iz secrets.
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Izgradnja Docker image-a in objava na Docker Hub.
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            anzezunec/stopnje_prevajanja:latest
            anzezunec/stopnje_prevajanja:${{ github.event.workflow_run.head_sha }}