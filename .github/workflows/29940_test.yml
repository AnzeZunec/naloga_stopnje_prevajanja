name: 29940_test

on:
  # Workflow se sproži ob vsakem pushu na main vejo.
  push:
    branches:
      - main

jobs:
  check_tests:
    # Prvi job preveri, ali obstajajo testne skripte.
    runs-on: self-hosted

    steps:
      # Prenos vsebine repozitorija na runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Preverimo obstoj testnih skript.
      # Standardno napako preusmerimo v napaka.txt.
      - name: Check test scripts
        shell: bash
        run: |
          : > napaka.txt
          test -f tests/test_build.sh 2>> napaka.txt
          test -f tests/test_run.sh 2>> napaka.txt
          test -f tests/test_clean.sh 2>> napaka.txt

          if [ -s napaka.txt ]; then
            echo "Napake pri preverjanju testnih skript:"
            cat napaka.txt
          else
            echo "Vse testne skripte obstajajo."
          fi

      # Datoteko napaka.txt pošljemo kot artefakt,
      # da jo lahko uporabi naslednji job.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-status
          path: napaka.txt

  run_tests:
    # Drugi job je odvisen od prvega.
    needs: check_tests
    runs-on: self-hosted

    # Vsak test se požene kot ločen job
    strategy:
      fail-fast: false
      matrix:
        test_script:
          - tests/test_build.sh
          - tests/test_run.sh
          - tests/test_clean.sh

    steps:
      # Ponovni checkout repozitorija.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Prenesemo artefakt iz prvega joba.
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: test-status

      # Če napaka.txt ni prazna, se testi ne smejo izvajati.
      - name: Check napaka.txt
        shell: bash
        run: |
          if [ -s napaka.txt ]; then
            echo "napaka.txt ni prazna, testi se ne smejo izvajati."
            cat napaka.txt
            exit 1
          fi

      # Poženemo posamezno testno skripto iz matrike.
      - name: Run test
        shell: bash
        run: |
          chmod +x tests/*.sh
          "${{ matrix.test_script }}"